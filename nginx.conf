# Nginx Traffic Management & High-Availability Reverse Proxy Configuration
# Optimized for AECTSD 2027 International Conference Website

user nginx;
worker_processes auto;
worker_rlimit_nofile 65535;
pid /var/run/nginx.pid;

events {
    worker_connections 8192;
    multi_accept on;
    use epoll;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Performance Tuning
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    keepalive_requests 1000;
    types_hash_max_size 2048;
    server_tokens off;

    # Buffer Limits for DDoS Mitigation
    client_body_buffer_size 128k;
    client_max_body_size 20M;
    client_header_buffer_size 1k;
    large_client_header_buffers 4 8k;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;

    # Rate Limiting & Traffic Management Zones
    # Zone 1: Protect site against burst traffic & DDoS attacks (10 req/sec per IP)
    limit_req_zone $binary_remote_addr zone=traffic_limit:10m rate=10r/s;
    limit_req_status 429;

    # Zone 2: Strict Rate Limiting for API calls & Form Submissions (3 req/sec per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=3r/s;

    # Zone 3: Connection limiting per IP (max 20 concurrent TCP connections per IP)
    limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

    # Gzip High-Efficiency Compression
    gzip on;
    gzip_disable "msie6";
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_buffers 16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    server {
        listen 80;
        listen [::]:80;
        server_name localhost _;

        root /usr/share/nginx/html;
        index index.html;

        # Global Security Headers
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

        # Apply Global Connection Limit
        limit_conn conn_limit 20;

        # Main SPA Routing & Rate-Limited Web Traffic
        location / {
            limit_req zone=traffic_limit burst=20 nodelay;
            try_files $uri $uri/ /index.html;
        }

        # Static Assets Caching Policy (JS, CSS, Images, WebP)
        location ~* \.(?:css|js|png|jpg|jpeg|gif|webp|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, max-age=31536000, immutable";
            access_log off;
            tcp_nodelay off;
        }

        # HTML Caching Policy (Always revalidate latest index.html)
        location = /index.html {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            add_header Pragma "no-cache";
            expires 0;
        }

        # Rate-Limited API Proxy (for Supabase / Edge Functions if proxied locally)
        location /api/ {
            limit_req zone=api_limit burst=5 nodelay;
            proxy_pass https://exviushwdtdyotfnphsl.supabase.co/;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_cache_bypass $http_upgrade;
        }

        # Custom 404 & Error Handling
        error_page 404 /index.html;
        error_page 429 = @too_many_requests;
        error_page 500 502 503 504 /50x.html;

        location @too_many_requests {
            default_type application/json;
            return 429 '{"error": "Too many requests. Traffic rate limit exceeded. Please try again in a few seconds."}';
        }

        location = /50x.html {
            root /usr/share/nginx/html;
        }
    }
}
